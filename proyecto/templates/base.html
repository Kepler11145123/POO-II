<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}TaskFlow{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --color-primary:   #2563eb;
      --color-success:   #16a34a;
      --color-warning:   #d97706;
      --color-danger:    #dc2626;
      --color-surface:   #f8fafc;
      --color-border:    #e2e8f0;
    }

    body {
      background-color: var(--color-surface);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Navbar */
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }

    /* Cards */
    .card { border: 1px solid var(--color-border); border-radius: 12px; }
    .card-header { background: #fff; border-bottom: 1px solid var(--color-border); border-radius: 12px 12px 0 0 !important; }

    /* Badges de prioridad */
    .badge-alta   { background-color: #fee2e2; color: #991b1b; }
    .badge-media  { background-color: #fef9c3; color: #854d0e; }
    .badge-baja   { background-color: #dcfce7; color: #166534; }

    /* Tarea completada */
    .tarea-completada .tarea-titulo { text-decoration: line-through; color: #94a3b8; }

    /* HTMX indicator */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }

    /* Animación suave al insertar elementos */
    .htmx-added { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-kanban me-2"></i>TaskFlow
      </a>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
