<div class="card shadow-sm" id="contenedor-tareas-{{ proyecto_id }}">
  <div class="card-header d-flex justify-content-between align-items-center py-2">
    <h6 class="mb-0 fw-semibold">
      <i class="bi bi-list-check me-1 text-primary"></i>Tareas del proyecto
    </h6>
    <span class="badge bg-primary rounded-pill">{{ tareas | length }}</span>
  </div>

  <div class="card-body">

    <!-- Formulario agregar tarea -->
    {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form
      hx-post="/proyectos/{{ proyecto_id }}/tareas"
      hx-target="#contenedor-tareas-{{ proyecto_id }}"
      hx-swap="outerHTML"
      class="row g-2 mb-3"
    >
      <div class="col-12 col-md-5">
        <input
          type="text"
          name="titulo"
          class="form-control form-control-sm"
          placeholder="Título de la tarea *"
          required
          minlength="3"
        />
      </div>
      <div class="col-12 col-md-4">
        <input
          type="text"
          name="descripcion"
          class="form-control form-control-sm"
          placeholder="Descripción (opcional)"
        />
      </div>
      <div class="col-6 col-md-2">
        <select name="prioridad" class="form-select form-select-sm">
          <option value="Baja">Baja</option>
          <option value="Media" selected>Media</option>
          <option value="Alta">Alta</option>
        </select>
      </div>
      <div class="col-6 col-md-1">
        <button type="submit" class="btn btn-primary btn-sm w-100" title="Agregar tarea">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </form>

    <!-- Lista de tareas -->
    {% if tareas %}
      <ul class="list-unstyled mb-0" id="lista-tareas-{{ proyecto_id }}">
        {% for tarea in tareas %}
          {% include "tareas/item.html" %}
        {% endfor %}
      </ul>
    {% else %}
      <p class="text-muted text-center small py-3">
        <i class="bi bi-inbox fs-4 d-block mb-1"></i>
        No hay tareas. ¡Agrega la primera!
      </p>
    {% endif %}

  </div>
</div>
