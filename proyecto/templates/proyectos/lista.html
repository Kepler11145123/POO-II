
{% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
{% endif %}

{% if proyectos %}
  <div class="list-group shadow-sm">
    {% for p in proyectos %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <button
          type="button"
          class="btn btn-link text-start flex-grow-1 text-decoration-none"
          hx-get="/proyectos/{{ p.id }}/tareas"
          hx-target="#panel-tareas"
          hx-swap="innerHTML"
          hx-trigger="click"
        >
          <div class="fw-semibold">{{ p.nombre }}</div>
          {% if p.descripcion %}
            <small class="text-muted">{{ p.descripcion }}</small>
          {% endif %}
        </button>
        <div class="d-flex gap-2 align-items-center">
          <span class="badge bg-secondary rounded-pill">{{ p.total_tareas }}</span>
          <button
            type="button"
            class="btn btn-danger btn-sm"
            hx-delete="/proyectos/{{ p.id }}"
            hx-target="#lista-proyectos"
            hx-swap="innerHTML"
            hx-confirm="¿Eliminar proyecto '{{ p.nombre }}'?"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <p class="text-muted text-center small mt-2">No hay proyectos todavía.</p>
{% endif %}
