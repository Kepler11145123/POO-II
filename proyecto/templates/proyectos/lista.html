
{% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
{% endif %}

{% if proyectos %}
  <div class="list-group shadow-sm">
    {% for p in proyectos %}
      <button
        type="button"
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
        hx-get="/proyectos/{{ p.id }}/tareas"
        hx-target="#panel-tareas"
        hx-swap="innerHTML"
        hx-trigger="click"
      >
        <div>
          <div class="fw-semibold">{{ p.nombre }}</div>
          {% if p.descripcion %}
            <small class="text-muted">{{ p.descripcion }}</small>
          {% endif %}
        </div>
        <span class="badge bg-secondary rounded-pill">{{ p.total_tareas }}</span>
      </button>
    {% endfor %}
  </div>
{% else %}
  <p class="text-muted text-center small mt-2">No hay proyectos todavía.</p>
{% endif %}
