<!-- proyectos/form.html — Formulario para crear un proyecto -->
<div class="card shadow-sm mb-3">
  <div class="card-header py-2">
    <h6 class="mb-0 fw-semibold">
      <i class="bi bi-plus-circle me-1 text-primary"></i>Nuevo proyecto
    </h6>
  </div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form
      hx-post="/proyectos"
      hx-target="#lista-proyectos"
      hx-swap="innerHTML"
    >
      <div class="mb-2">
        <input
          type="text"
          name="nombre"
          class="form-control form-control-sm"
          placeholder="Nombre del proyecto *"
          required
          minlength="3"
        />
      </div>
      <div class="mb-2">
        <input
          type="text"
          name="descripcion"
          class="form-control form-control-sm"
          placeholder="Descripción (opcional)"
        />
      </div>
      <button type="submit" class="btn btn-primary btn-sm w-100">
        <span class="htmx-indicator spinner-border spinner-border-sm me-1"></span>
        Crear proyecto
      </button>
    </form>
  </div>
</div>
