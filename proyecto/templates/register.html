{% extends "base.html" %}

{% block title %}Registro - TaskFlow{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow">
        <div class="card-header text-center">
          <h4>Crear cuenta</h4>
        </div>
        <div class="card-body">
          {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
          {% endif %}
          <form method="post" action="/auth/register">
            <div class="mb-3">
              <label for="username" class="form-label">Usuario</label>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                value="{{ form.username if form else '' }}"
                minlength="3"
                pattern="[A-Za-z0-9]+"
                required
              >
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                value="{{ form.email if form else '' }}"
                required
              >
            </div>
            <div class="mb-3">
              <label for="nombre_completo" class="form-label">Nombre completo</label>
              <input
                type="text"
                class="form-control"
                id="nombre_completo"
                name="nombre_completo"
                value="{{ form.nombre_completo if form else '' }}"
              >
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contrase&ntilde;a</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                minlength="6"
                required
              >
            </div>
            <div class="mb-3">
              <label for="confirmar_password" class="form-label">Confirmar contrase&ntilde;a</label>
              <input
                type="password"
                class="form-control"
                id="confirmar_password"
                name="confirmar_password"
                minlength="6"
                required
              >
            </div>
            <button type="submit" class="btn btn-primary w-100">Crear cuenta</button>
          </form>
          <div class="text-center mt-3">
            <span class="text-muted">Ya tienes cuenta?</span>
            <a href="/auth/login" class="ms-1">Inicia sesion</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
