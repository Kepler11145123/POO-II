[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:cacheprovider
norecursedirs = pytest-cache-files-* .pytest_cache __pycache__

markers =
    unit: tests unitarios puros
    integration: tests de integración
    smoke: pruebas críticas rápidas
